name: Translate Articles to Indonesian

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of articles to translate per run'
        required: false
        default: '10'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Translate articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BATCH_SIZE: ${{ github.event.inputs.batch_size }}
        run: node scripts/translate-articles.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/
          if git diff --cached --quiet; then
            echo "No translations done"
          else
            git commit -m "feat(content): translate articles to Bahasa Indonesia"
            git push
          fi
