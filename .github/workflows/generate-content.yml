name: Generate Article

on:
  schedule:
    - cron: '0 2 * * *' # Every day at 02:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARTICLE_COUNT: '10'
        run: node scripts/generate-article.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ scripts/published-log.json
          git diff --cached --quiet || git commit -m "feat(content): auto-generate daily articles"
          git push

      - name: Submit to IndexNow (Bing, Yandex)
        run: node scripts/indexnow-submit.mjs

      - name: Ping search engines
        run: node scripts/ping-search-engines.mjs
