name: Generate Article

on:
  schedule:
    - cron: '0 2 * * *' # Every day at 02:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Generate articles
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ARTICLE_COUNT: '5'
        run: node scripts/generate-article.mjs

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/ scripts/published-log.json
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "feat(content): auto-generate daily articles"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Build site
        if: steps.commit.outputs.has_changes == 'true'
        env:
          PUBLIC_ADSENSE_CLIENT: ${{ secrets.PUBLIC_ADSENSE_CLIENT }}
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.commit.outputs.has_changes == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler pages deploy dist --project-name evantoday-id --branch main --commit-dirty=true --commit-message "Auto-deploy daily articles"

      - name: Submit to IndexNow (Bing, Yandex)
        if: steps.commit.outputs.has_changes == 'true'
        run: node scripts/indexnow-submit.mjs

      - name: Ping search engines
        if: steps.commit.outputs.has_changes == 'true'
        run: node scripts/ping-search-engines.mjs
