        - heading "Kenapa Rp 150 Juta Itu Angka yang Pas" [level=2] [ref=e99]
        - paragraph [ref=e100]: Seratus lima puluh juta rupiah. Angka ini terdengar besar, tapi masih terasa mungkin dicapai. Dan justru itu yang bikin target ini efektif. Jumlah ini cukup untuk dana darurat yang kuat, uang muka mobil, liburan yang benar-benar berarti, atau jadi modal awal investasi yang serius.
        - paragraph [ref=e101]: Saat pertama kali saya menetapkan target ini untuk diri sendiri, penghasilan saya sekitar Rp 780 juta per tahun. Setelah pajak, kira-kira setara Rp 51 juta per bulan. Menabung Rp 150 juta dalam 12 bulan berarti saya harus menyisihkan sekitar Rp 12,5 juta per bulan, atau sekitar Rp 2,9 juta per minggu. Rasanya ketat. Sangat ketat. Tapi di akhir tahun itu, saldo tabungan saya mencapai Rp 153,7 juta. Ini persis bagaimana saya melakukannya, dibagi bulan demi bulan.
