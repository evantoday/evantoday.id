        - paragraph [ref=e157]: Ini memang terasa tidak nyaman. Kamu mungkin khawatir terlihat serakah atau tidak realistis. Tapi riset terus menunjukkan bahwa anchor yang lebih tinggi mendorong hasil akhir yang lebih tinggi, bahkan saat angkanya cukup agresif.
