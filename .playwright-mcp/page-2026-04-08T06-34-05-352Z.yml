        - heading "Kenapa Saya Hampir Kehilangan Rp 180 Juta" [level=2] [ref=e87]
        - paragraph [ref=e88]: Tiga tahun lalu, saya dapat tawaran kerja sebesar Rp 1,4 miliar per tahun. Reaksi pertama saya tentu senang sekali. Itu berarti naik sekitar Rp 225 juta dari gaji saya sebelumnya, dan saya hampir langsung menerimanya. Tapi saya minta waktu 48 jam untuk berpikir, melakukan riset, lalu kembali dengan penawaran balik.
        - paragraph [ref=e89]: Angka akhirnya? Rp 1,6 miliar, ditambah cuti ekstra satu minggu dan bonus tanda tangan Rp 75 juta.
        - paragraph [ref=e90]:
          - text: "Satu percakapan itu, yang benar-benar cuma butuh sekitar 20 menit negosiasi, bernilai lebih dari Rp 180 juta di kompensasi tahun pertama. Dan yang lebih penting: karena kenaikan gaji dan bonus di masa depan biasanya dihitung dari gaji pokok, kenaikan Rp 180 juta itu akan terus berdampak sepanjang karier saya. Estimasi konservatifnya, nilainya bisa mencapai Rp 4,5 miliar atau lebih seumur hidup. Uang tambahan itu, kalau diinvestasikan dengan bijak lewat"
          - link "reksadana" [ref=e91] [cursor=pointer]:
            - /url: /blog/index-fund-investing-guide/
          - text: atau
          - link "investasi pensiun" [ref=e92] [cursor=pointer]:
            - /url: /blog/how-to-financially-prepare-for-retirement/
          - text: ", bisa mempercepat jalanmu menuju kebebasan finansial secara signifikan."
        - paragraph [ref=e93]: Namun menurut riset dari Salary.com, 57% orang Amerika tidak pernah menegosiasikan gaji mereka. Mereka menerima apa pun yang ditawarkan. Kalau kamu termasuk orang seperti itu, panduan ini akan mengubah cara kamu selamanya.
        - heading "Kenapa Perusahaan Mengharapkan Kamu Negosiasi" [level=2] [ref=e94]
        - paragraph [ref=e95]: "Saya mau luruskan mitos terbesar dulu: menegosiasikan gaji tidak akan membuat perusahaan menarik kembali tawaran kerja. Dalam survei 2024 terhadap hiring manager, 84% bilang mereka memang mengharapkan kandidat negosiasi, dan hanya 1% yang pernah menarik tawaran karena seseorang meminta gaji lebih tinggi."
        - paragraph [ref=e96]: "Inilah alasan perusahaan sengaja menyisakan ruang dalam tawaran mereka:"
        - list [ref=e97]:
          - listitem [ref=e98]:
            - strong [ref=e99]: Rentang anggaran
            - text: ": Setiap posisi punya kisaran gaji. Tawaran awal jarang sekali berada di batas atas"
          - listitem [ref=e100]:
            - strong [ref=e101]: Biaya rekrutmen
            - text: ": Perusahaan bisa menghabiskan Rp 60 juta-Rp 300 juta+ untuk mengisi satu posisi. Mereka tidak akan membuang itu hanya karena kenaikan gaji 5-10%"
          - listitem [ref=e102]:
            - strong [ref=e103]: Negosiasi adalah skill yang mereka nilai
            - text: ": Terutama untuk posisi yang berhubungan dengan klien atau kepemimpinan, kemampuan negosiasimu memang sedang dinilai"
        - paragraph [ref=e104]: Risiko tidak negosiasi jauh lebih besar daripada risiko meminta lebih.
        - heading "7 Taktik yang Benar-Benar Berhasil" [level=2] [ref=e105]
        - 'heading "Taktik 1: Riset Nilai Pasarmu Dulu" [level=3] [ref=e106]'
        - paragraph [ref=e107]: "Kamu tidak bisa negosiasi dengan efektif kalau tidak tahu nilai dirimu. Sebelum bicara soal gaji, luangkan 30 menit untuk mengumpulkan data dari sumber-sumber ini:"
        - list [ref=e108]:
