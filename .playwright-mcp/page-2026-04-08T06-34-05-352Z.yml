        - 'heading "Taktik 2: Biarkan Mereka Sebut Angka Dulu" [level=3] [ref=e140]'
        - paragraph [ref=e141]: "Saat ditanya ekspektasi gaji di awal proses, jangan buru-buru jawab. Pakai skrip seperti ini:"
        - paragraph [ref=e142]:
          - strong [ref=e143]: “Berapa ekspektasi gaji Anda?”
        - list [ref=e144]:
          - listitem [ref=e145]: “Saya fokus mencari kecocokan yang tepat, dan saya yakin kita bisa sepakat soal kompensasi yang adil. Boleh saya tahu kisaran anggaran untuk posisi ini?”
          - listitem [ref=e146]: “Saya lebih suka memahami tanggung jawabnya dulu sebelum membahas angka spesifik. Kisaran berapa yang Anda bayangkan?”
          - listitem [ref=e147]: “Berdasarkan riset saya, posisi seperti ini biasanya ada di kisaran Rp X sampai Rp Y. Saya fleksibel dalam kisaran itu, tergantung paket kompensasi totalnya.”
        - paragraph [ref=e148]: Orang yang menyebut angka dulu biasanya berada di posisi yang kurang menguntungkan karena dia yang menetapkan patokan awal. Kalau kamu menyebut Rp 15 juta per bulan, padahal mereka siap menawarkan Rp 17,5 juta, berarti kamu baru saja meninggalkan Rp 30 juta setahun di meja.
        - 'heading "Taktik 3: Pasang Angka Lebih Tinggi" [level=3] [ref=e149]'
        - paragraph [ref=e150]: "Kalau kamu yang menyebut angka, targetkan 10-20% di atas angka idealmu. Ini disebut efek anchoring: angka pertama dalam negosiasi sangat memengaruhi hasil akhir, terlepas dari apakah angka itu terasa masuk akal atau tidak."
