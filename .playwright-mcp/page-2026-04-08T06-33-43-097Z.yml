      - generic [ref=e115]:
        - paragraph [ref=e116]: Seorang tetangga saya mengalami kebakaran dapur tahun lalu yang menyebabkan kerusakan sekitar Rp 675 juta. Asuransi rumahnya menanggung semua biaya di atas deductible Rp 15 juta. Sementara itu, teman lain memilih tidak ambil perlindungan untuk kondominium yang sudah lunas, lalu harus bayar sendiri tagihan kerusakan air sebesar Rp 180 juta. Perbedaan dua hasil itu adalah hal yang ingin saya bantu kamu pahami.
        - paragraph [ref=e117]: Rata-rata pemilik rumah di AS membayar sekitar Rp 29 juta per tahun untuk asuransi, tapi saya pernah lihat angkanya berkisar dari Rp 12 juta sampai lebih dari Rp 60 juta, tergantung lokasi, aset yang dimiliki, dan perusahaan asuransi yang dipilih. Di panduan ini, saya akan bantu kamu memahami cara mendapatkan perlindungan yang tepat tanpa bayar terlalu mahal.
        - heading "What Homeowners Insurance Actually Covers" [level=2] [ref=e118]
        - paragraph [ref=e119]: "Polis asuransi rumah standar (disebut HO-3 dalam istilah industri) mencakup enam area utama:"
        - heading "Dwelling Coverage (Coverage A)" [level=3] [ref=e120]
        - paragraph [ref=e121]: Ini membayar biaya perbaikan atau pembangunan ulang struktur rumah kamu kalau rusak karena kejadian yang ditanggung—kebakaran, angin kencang, hujan es, petir, vandalisme, dan lainnya. Nilai perlindungan ini sebaiknya mengikuti biaya bangun ulang rumah, bukan nilai pasarnya.
        - paragraph [ref=e122]: Saya sering lihat pemilik rumah keliru membedakan nilai pasar dengan biaya bangun ulang. Tanah punya nilai, tapi kamu tidak perlu mengasuransikan tanahnya. Rumah senilai Rp 6 miliar mungkin hanya butuh Rp 4,2 miliar untuk dibangun ulang.
        - heading "Other Structures (Coverage B)" [level=3] [ref=e123]
        - paragraph [ref=e124]: Ini menanggung garasi terpisah, pagar, gudang, dan bangunan lain di properti kamu. Biasanya otomatis ditetapkan sebesar 10% dari perlindungan dwelling.
        - heading "Personal Property (Coverage C)" [level=3] [ref=e125]
        - paragraph [ref=e126]:
          - text: Ini menanggung barang-barang kamu—furnitur, elektronik, pakaian, peralatan rumah tangga—kalau dicuri atau rusak. Polis standar biasanya mengganti berdasarkan
          - strong [ref=e127]: actual cash value
          - text: (nilai setelah depresiasi), tapi saya sangat menyarankan upgrade ke perlindungan
          - strong [ref=e128]: replacement cost
          - text: . Selisih preminya kecil, tapi selisih klaimnya besar.
        - heading "Loss of Use (Coverage D)" [level=3] [ref=e129]
        - paragraph [ref=e130]: Kalau rumah kamu tidak bisa ditempati setelah kejadian yang ditanggung, ini membayar hotel, makan di luar, dan biaya hidup tambahan lainnya. Dari pengalaman saya, orang sering tidak kepikiran soal ini sampai benar-benar butuh, dan saat itu perlindungan ini sangat menyelamatkan.
        - heading "Liability (Coverage E)" [level=3] [ref=e131]
        - paragraph [ref=e132]: Kalau ada orang cedera di properti kamu lalu menggugat, perlindungan tanggung jawab ini membayar biaya pembelaan hukum dan ganti rugi. Jumlah standar biasanya Rp 1,5 miliar, tapi saya sarankan minimal Rp 4,5 miliar. Kalau aset kamu besar, pertimbangkan juga polis umbrella di atasnya.
        - heading "Medical Payments (Coverage F)" [level=3] [ref=e133]
        - paragraph [ref=e134]: Ini menanggung cedera ringan pada tamu di properti kamu tanpa melihat siapa yang salah—biasanya sekitar Rp 15 juta sampai Rp 75 juta. Tujuannya supaya insiden kecil tidak berkembang jadi gugatan.
        - heading "What Homeowners Insurance Does NOT Cover" [level=2] [ref=e135]
        - paragraph [ref=e136]: "Di sinilah banyak orang terjebak. Polis standar biasanya tidak mencakup:"
        - list [ref=e137]:
          - listitem [ref=e138]:
            - strong [ref=e139]: Banjir
            - text: — Kamu perlu polis asuransi banjir terpisah melalui program pemerintah atau perusahaan swasta
          - listitem [ref=e140]:
            - strong [ref=e141]: Gempa bumi
            - text: — Butuh polis terpisah atau endorsement tambahan
          - listitem [ref=e142]:
            - strong [ref=e143]: Back-up saluran pembuangan
            - text: — Biasanya add-on rider (sekitar Rp 750 ribu–Rp 1,5 juta/tahun, dan sangat layak)
          - listitem [ref=e144]:
            - strong [ref=e145]: Masalah perawatan
            - text: — Jamur akibat kebocoran kecil, kerusakan rayap, aus pada atap
          - listitem [ref=e146]:
            - strong [ref=e147]: Peralatan usaha rumahan
            - text: — Biasanya dibatasi sekitar Rp 37,5 juta; mungkin perlu rider
          - listitem [ref=e148]:
            - strong [ref=e149]: Ras anjing tertentu
            - text: — Beberapa insurer mengecualikan tanggung jawab untuk ras tertentu
          - listitem [ref=e150]:
            - strong [ref=e151]: Barang bernilai tinggi
            - text: — Perhiasan, karya seni, dan koleksi sering punya batas sub-limits (sekitar Rp 22,5 juta–Rp 37,5 juta); perlu dijadwalkan terpisah
        - paragraph [ref=e152]: Saya belajar soal pengecualian back-up saluran pembuangan dengan cara yang pahit saat basement teman saya kebanjiran. Rider Rp 1,1 juta/tahun itu bisa menghemat dia jutaan rupiah.
