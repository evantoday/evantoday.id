        - heading "4. Maintain a Claims-Free Record" [level=3] [ref=e280]
        - paragraph [ref=e281]: Mengajukan klaim kecil sering kali malah merugikan. Kalau ada perbaikan Rp 18 juta dengan deductible Rp 15 juta, kamu hanya klaim Rp 3 juta tapi premi bisa naik selama 3-5 tahun. Saya biasanya menyarankan untuk tidak mengajukan klaim di bawah Rp 37,5 juta kecuali kerugiannya serius.
        - heading "5. Shop Around Every 2-3 Years" [level=3] [ref=e282]
        - paragraph [ref=e283]: Loyalitas tidak selalu dibayar dalam asuransi. Saya pernah lihat pemilik rumah hemat lebih dari Rp 9 juta hanya dengan membandingkan penawaran lalu pindah atau negosiasi dengan insurer lama. Pakai situs seperti Policygenius atau Insurify untuk membandingkan dengan cepat.
        - heading "How Much Homeowners Insurance Do You Need?" [level=2] [ref=e284]
        - paragraph [ref=e285]: "Ini kerangka yang saya pakai untuk menentukan perlindungan yang tepat:"
        - paragraph [ref=e286]:
          - strong [ref=e287]: "Dwelling coverage:"
          - text: Dapatkan estimasi biaya bangun ulang. Insurer kamu bisa menghitungnya, atau pakai alat seperti kalkulator Marshall & Swift. Jangan pakai harga beli rumah atau estimasi Zillow.
        - paragraph [ref=e288]:
          - strong [ref=e289]: "Personal property:"
          - text: Buat inventaris rumah. Kebanyakan orang butuh perlindungan barang pribadi sekitar Rp 750 juta–Rp 2,25 miliar. Pastikan pakai replacement cost, bukan actual cash value.
        - paragraph [ref=e290]:
          - strong [ref=e291]: "Liability:"
          - text: Minimal Rp 4,5 miliar. Kalau
          - link "net worth" [ref=e292] [cursor=pointer]:
            - /url: /blog/how-to-calculate-net-worth-and-why-it-matters/
          - text: kamu lebih dari Rp 4,5 miliar, ambil polis umbrella (umbrella Rp 15 miliar biasanya biayanya sekitar Rp 3 juta–Rp 4,5 juta/tahun).
        - paragraph [ref=e293]:
          - strong [ref=e294]: "Deductible:"
          - text: Rp 15 juta–Rp 37,5 juta adalah titik ideal untuk kebanyakan pemilik rumah. Deductible lebih tinggi memang menurunkan premi, tapi kamu harus bayar lebih besar saat klaim.
        - heading "Special Considerations by Region" [level=2] [ref=e295]
        - heading "Coastal States (Florida, Texas, Louisiana, Carolinas)" [level=3] [ref=e296]
        - paragraph [ref=e297]: Deductible untuk angin dan badai biasanya terpisah dan jauh lebih tinggi—sering kali 2-5% dari dwelling coverage. Deductible badai 2% pada rumah Rp 4,5 miliar berarti kamu harus keluar Rp 90 juta dulu sebelum asuransi mulai menanggung kerusakan akibat badai.
        - heading "Tornado Alley (Oklahoma, Kansas, Nebraska, Missouri)" [level=3] [ref=e298]
        - paragraph [ref=e299]: Pertimbangkan atap tahan benturan untuk keamanan sekaligus diskon premi yang cukup besar. Beberapa insurer memberi diskon 25% untuk shingles tahan benturan kelas 4.
        - heading "Wildfire Zones (California, Colorado, Oregon)" [level=3] [ref=e300]
        - paragraph [ref=e301]: Perlindungan makin sulit dicari dan makin mahal. Kalau kamu berada di area berisiko tinggi, pertimbangkan program FAIR Plan (insurer terakhir) atau bekerja dengan agen independen yang bisa mengakses carrier surplus lines.
        - heading "Flood Zones" [level=3] [ref=e302]
        - paragraph [ref=e303]: Asuransi rumah standar tidak pernah menanggung banjir. Kalau kamu berada di zona banjir yang ditetapkan pemerintah, pemberi KPR akan mewajibkan asuransi banjir. Bahkan kalau kamu tidak berada di zona resmi, saya tetap menyarankannya—lebih dari 25% klaim banjir datang dari luar area risiko tinggi.
        - heading "When to File a Claim vs. Pay Out of Pocket" [level=2] [ref=e304]
        - paragraph [ref=e305]: "Ini sesuatu yang saya sangat yakini. Tidak semua kerugian harus jadi klaim. Ini aturan praktis saya:"
        - list [ref=e306]:
          - listitem [ref=e307]:
            - strong [ref=e308]: "Kerusakan di bawah Rp 37,5 juta:"
            - text: Bayar sendiri kecuali bagian dari masalah yang lebih besar
          - listitem [ref=e309]:
            - strong [ref=e310]: "Kerusakan di atas Rp 75 juta:"
            - text: Ajukan klaim
          - listitem [ref=e311]:
            - strong [ref=e312]: "Di antara Rp 37,5 juta–Rp 75 juta:"
            - text: Pertimbangkan riwayat klaim dan dampak ke premi
          - listitem [ref=e313]:
            - strong [ref=e314]: "Klaim tanggung jawab:"
            - text: Selalu ajukan segera, berapa pun nilainya
          - listitem [ref=e315]:
            - strong [ref=e316]: "Kerusakan katastrofik:"
            - text: Selalu ajukan segera
        - paragraph [ref=e317]: Setiap klaim akan tetap tercatat di laporan CLUE kamu selama 5-7 tahun dan bisa memengaruhi premi di insurer mana pun.
        - heading "Frequently Asked Questions" [level=2] [ref=e318]
        - heading "How much homeowners insurance do I need?" [level=3] [ref=e319]
        - paragraph [ref=e320]: Perlindungan dwelling kamu sebaiknya sama dengan estimasi biaya bangun ulang rumah—not nilai pasar atau harga beli. Saya sarankan minta estimasi bangun ulang dari insurer atau penilai independen. Untuk personal property, buat inventaris per ruangan dan pilih replacement cost. Liability sebaiknya minimal Rp 4,5 miliar, dengan polis umbrella jika net worth kamu lebih tinggi.
        - heading "Is homeowners insurance required by law?" [level=3] [ref=e321]
        - paragraph [ref=e322]: Tidak ada negara bagian yang secara hukum mewajibkan asuransi rumah. Tapi kalau kamu punya KPR, pemberi pinjaman akan mewajibkannya. Bahkan kalau rumah sudah lunas, hidup tanpa asuransi tetap sangat berisiko. Satu kebakaran rumah atau gugatan tanggung jawab bisa menghabiskan tabungan bertahun-tahun.
        - heading "What’s the difference between actual cash value and replacement cost?" [level=3] [ref=e323]
        - paragraph [ref=e324]: Actual cash value membayar nilai barang kamu saat ini setelah depresiasi. TV berusia 5 tahun yang dulu harganya Rp 15 juta mungkin hanya dibayar Rp 4,5 juta. Replacement cost membayar biaya untuk membeli barang baru yang setara—jadi kamu dapat biaya penuh untuk TV baru yang sebanding. Selisih premi biasanya 10-15%, dan saya selalu merekomendasikan replacement cost.
        - heading "Does homeowners insurance cover water damage?" [level=3] [ref=e325]
        - paragraph [ref=e326]: Tergantung sumbernya. Kerusakan air yang tiba-tiba dan tidak disengaja (pipa pecah, kerusakan akibat badai) biasanya ditanggung. Kerusakan bertahap (kebocoran kecil, perawatan buruk) tidak. Kerusakan akibat banjir dari air yang naik butuh polis asuransi banjir terpisah. Back-up saluran pembuangan biasanya perlu endorsement tambahan.
        - heading "How can I lower my homeowners insurance premium quickly?" [level=3] [ref=e327]
        - paragraph [ref=e328]: "Cara tercepat adalah: naikkan deductible ke Rp 37,5 juta (hemat 15-30%), bundel dengan asuransi mobil (hemat 15-25%), dan pasang sistem keamanan yang dipantau (hemat 5-15%). Tiga perubahan ini bisa menghemat Rp 7,5 juta–Rp 15 juta per tahun. Setelah itu, bandingkan ulang polis kamu setiap 2-3 tahun supaya tetap dapat tarif yang kompetitif."
