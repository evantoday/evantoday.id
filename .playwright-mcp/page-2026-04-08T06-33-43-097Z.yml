        - heading "5 Ways to Save $1,000+ on Homeowners Insurance" [level=2] [ref=e260]
        - heading "1. Bundle Your Policies" [level=3] [ref=e261]
        - paragraph [ref=e262]:
          - text: Menggabungkan asuransi rumah dan
          - link "asuransi mobil" [ref=e263] [cursor=pointer]:
            - /url: /blog/car-insurance-comparison-2026/
          - text: bisa menghemat 15-25% di banyak insurer. Dari premi Rp 29 juta, itu setara sekitar Rp 4,3 juta–Rp 7,2 juta per tahun. Ini salah satu cara termudah untuk hemat di asuransi.
        - heading "2. Raise Your Deductible" [level=3] [ref=e264]
        - paragraph [ref=e265]:
          - text: Naik dari deductible Rp 7,5 juta ke Rp 37,5 juta bisa menghemat 15-30% premi kamu. Tapi pastikan kamu punya tabungan likuid yang cukup untuk menutup deductible yang lebih tinggi kalau harus
          - link "mengajukan klaim" [ref=e266] [cursor=pointer]:
            - /url: /blog/7-proven-steps-to-claim-insurance-2026-guide/
          - text: .
