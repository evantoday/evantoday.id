        - paragraph [ref=e326]: "Bagi kebanyakan pemula, ETF adalah pilihan yang lebih baik karena minimum investasinya lebih rendah, biayanya lebih kecil, dan fleksibilitasnya lebih besar. Pengecualian utamanya: kalau kamu ingin berinvestasi di reksa dana saham Vanguard Admiral Shares (expense ratio 0,04% dengan minimum Rp 45 juta), selisih biayanya nyaris tidak terasa."
        - heading "Building a Simple ETF Portfolio" [level=2] [ref=e327]
        - paragraph [ref=e328]: "Berikut tiga contoh portofolio berdasarkan usia dan toleransi risiko:"
        - heading "Aggressive (Ages 20-35)" [level=3] [ref=e329]
        - list [ref=e330]:
          - listitem [ref=e331]: 70% VTI (Pasar Saham AS Total)
          - listitem [ref=e332]: 20% VXUS (Internasional)
          - listitem [ref=e333]: 10% BND (Obligasi)
        - heading "Moderate (Ages 35-50)" [level=3] [ref=e334]
        - list [ref=e335]:
          - listitem [ref=e336]: 50% VTI (Pasar Saham AS Total)
          - listitem [ref=e337]: 20% VXUS (Internasional)
          - listitem [ref=e338]: 30% BND (Obligasi)
        - heading "Conservative (Ages 50+)" [level=3] [ref=e339]
        - list [ref=e340]:
          - listitem [ref=e341]: 30% VTI (Pasar Saham AS Total)
          - listitem [ref=e342]: 10% VXUS (Internasional)
          - listitem [ref=e343]: 60% BND (Obligasi)
        - paragraph [ref=e344]:
          - text: Ini hanyalah contoh sederhana. Alokasi sebenarnya harus mencerminkan toleransi risiko pribadi kamu,
          - link "tujuan keuangan" [ref=e345] [cursor=pointer]:
            - /url: /blog/comprehensive-guide-to-setting-financial-goals-for-beginners/
          - text: ", dan jangka waktu investasi."
        - heading "Common ETF Mistakes to Avoid" [level=2] [ref=e346]
        - list [ref=e347]:
          - listitem [ref=e348]:
            - strong [ref=e349]: Terlalu banyak diversifikasi
            - text: — Punya 15 ETF yang isinya saling tumpang tindih. Tiga sampai lima ETF yang dipilih dengan baik biasanya sudah cukup untuk sebagian besar investor.
          - listitem [ref=e350]:
            - strong [ref=e351]: Mengejar performa
            - text: — Membeli ETF yang naik 40% tahun lalu. Return masa lalu tidak menjamin hasil masa depan.
          - listitem [ref=e352]:
            - strong [ref=e353]: Mengabaikan expense ratio
            - text: — Selisih 0,50% bisa bertambah jadi jutaan rupiah dalam beberapa dekade.
          - listitem [ref=e354]:
            - strong [ref=e355]: Terlalu sering trading
            - text: — ETF dirancang untuk investasi jangka panjang. Day trading ETF justru menghilangkan tujuannya.
          - listitem [ref=e356]:
            - strong [ref=e357]: Melewatkan eksposur internasional
            - text: — Saham AS tidak selalu unggul. Diversifikasi global menurunkan risiko.
          - listitem [ref=e358]:
            - strong [ref=e359]: Mencoba timing pasar
            - text: — Tidak ada yang konsisten mengalahkan pasar dengan keluar-masuk terus. Investasi secara rutin dan tetaplah berinvestasi.
        - heading "Tax Considerations for ETF Investors" [level=2] [ref=e360]
        - paragraph [ref=e361]: "ETF punya keunggulan struktural dibanding reksa dana dalam urusan pajak:"
        - list [ref=e362]:
          - listitem [ref=e363]:
            - strong [ref=e364]: Creation/redemption in-kind
            - text: — ETF bisa menukar sekuritas tanpa memicu capital gain, jadi lebih sedikit kejadian pajak untuk kamu
          - listitem [ref=e365]:
            - strong [ref=e366]: Dividen yang memenuhi syarat
            - text: — Sebagian besar dividen ETF dari saham AS diperlakukan sebagai dividen yang dikenai tarif lebih rendah
          - listitem [ref=e367]:
            - strong [ref=e368]: Capital gains
            - text: — Hanya muncul saat kamu menjual. Kalau kamu hold, kamu tidak membayar.
          - listitem [ref=e369]:
            - strong [ref=e370]: Tax-loss harvesting
            - text: — Kamu bisa menjual ETF saat rugi lalu membeli ETF lain yang mirip tapi tidak identik untuk mengklaim pengurang pajak sambil tetap berinvestasi
        - paragraph [ref=e371]:
          - strong [ref=e372]: "Pro tip:"
          - text: Simpan ETF kamu di
          - link "reksadana/investasi pensiun" [ref=e373] [cursor=pointer]:
            - /url: /blog/how-to-financially-prepare-for-retirement/
          - text: kalau memungkinkan. Semua pertumbuhan dan dividen bisa bebas pajak.
        - heading "Frequently Asked Questions" [level=2] [ref=e374]
        - heading "Can I lose all my money in an ETF?" [level=3] [ref=e375]
        - paragraph [ref=e376]: Secara teori, ETF bisa turun sampai nol kalau semua perusahaan di dalamnya bangkrut bersamaan — tapi untuk ETF pasar luas seperti VOO atau VTI, itu berarti seluruh ekonomi AS runtuh. Itu belum pernah terjadi. ETF memang bisa turun nilainya saat pasar melemah (penurunan 20-40% pernah terjadi secara historis), tetapi ETF pasar luas selalu pulih dan mencapai level tertinggi baru seiring waktu.
        - heading "What’s the difference between VOO and SPY?" [level=3] [ref=e377]
        - paragraph [ref=e378]: "Keduanya melacak S&P 500 dan hasilnya hampir identik. Perbedaan utamanya: VOO punya expense ratio lebih rendah (0,03% vs 0,09%), sementara SPY punya volume perdagangan lebih tinggi dan bid-ask spread lebih ketat. Untuk investor jangka panjang, biaya VOO yang lebih rendah membuatnya lebih unggul. Untuk trader aktif, likuiditas SPY lebih menguntungkan."
        - heading "How much should I invest in ETFs each month?" [level=3] [ref=e379]
        - paragraph [ref=e380]: Panduan umum adalah menginvestasikan 15-20% dari penghasilan bruto untuk pensiun. Tapi berapa pun jumlahnya lebih baik daripada tidak sama sekali. Kalau kamu baru mampu Rp 750 ribu per bulan, mulai dari situ. Faktor terpenting adalah konsistensi, bukan nominal. Seseorang yang berinvestasi Rp 3 juta per bulan selama 30 tahun hampir pasti akan mengalahkan orang yang menunggu sampai bisa investasi Rp 15 juta per bulan.
        - heading "Should I invest a lump sum or dollar cost average into ETFs?" [level=3] [ref=e381]
        - paragraph [ref=e382]:
          - text: Riset menunjukkan bahwa investasi sekaligus biasanya mengungguli
          - link "dollar cost averaging" [ref=e383] [cursor=pointer]:
            - /url: /blog/dollar-cost-averaging-strategy-explained/
          - text: sekitar dua pertiga dari waktu karena pasar cenderung naik. Namun, DCA mengurangi risiko membeli di puncak dan secara psikologis lebih nyaman. Kalau kamu punya dana besar dan masih ragu, kompromi yang masuk akal adalah menginvestasikannya selama 3-6 bulan dalam cicilan yang sama.
        - heading "Do ETFs pay dividends?" [level=3] [ref=e384]
        - paragraph [ref=e385]: Ya, sebagian besar ETF saham membayar dividen, biasanya tiap kuartal. Dividen ini berasal dari saham-saham yang ada di dalam ETF. Misalnya, VOO membagikan dividen yang dibayar oleh semua 500 perusahaan di S&P 500. Kamu bisa memilih menerima dividen sebagai uang tunai atau menginvestasikannya kembali secara otomatis untuk membeli lebih banyak lembar. Untuk pertumbuhan jangka panjang, reinvestasi sangat disarankan.
