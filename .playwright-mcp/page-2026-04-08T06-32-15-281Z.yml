      - generic [ref=e112]:
        - paragraph [ref=e113]: "When I first started investing, I made the classic beginner mistake: I tried to pick individual stocks. I bought a little Apple, some Tesla, threw money at a random biotech company someone on Reddit mentioned. Portofolio saya kelihatan seperti puzzle yang kepingnya banyak hilang."
        - paragraph [ref=e114]: Lalu seseorang mengenalkan saya ke ETF, dan semuanya langsung masuk akal. Daripada pusing memilih saham satu per satu, saya bisa punya sebagian kecil dari 500 perusahaan hanya dengan satu pembelian. Stres saya turun, hasil investasi saya membaik, dan saya malah jadi menikmati proses investing.
        - paragraph [ref=e115]: Kalau kamu baru mulai dan punya bahkan Rp 1,5 juta untuk diinvestasikan, ETF adalah tempat terbaik untuk memulai. Ini semua yang dulu ingin saya tahu sejak hari pertama.
        - heading "Key Takeaways" [level=2] [ref=e116]
        - list [ref=e117]:
          - listitem [ref=e118]: ETF (Exchange-Traded Fund) memungkinkan kamu berinvestasi di ratusan saham dengan satu pembelian
          - listitem [ref=e119]: Rata-rata ETF S&P 500 menghasilkan sekitar 10% per tahun selama 30 tahun terakhir
          - listitem [ref=e120]: Kamu bisa mulai bahkan dengan Rp 15 ribu lewat fractional shares
          - listitem [ref=e121]: Total expense ratio di bawah 0,10% dianggap sangat bagus
          - listitem [ref=e122]: ETF lebih efisien pajak dibanding reksa dana untuk akun kena pajak
        - heading "What Is an ETF?" [level=2] [ref=e123]
        - paragraph [ref=e124]: ETF — Exchange-Traded Fund — adalah kumpulan investasi yang dibundel jadi satu produk dan diperdagangkan di bursa saham, sama seperti saham biasa.
        - paragraph [ref=e125]: Bayangkan seperti membeli paket campuran, bukan barang satuan. Saat kamu membeli satu lembar ETF S&P 500, kamu langsung punya porsi kecil dari semua 500 perusahaan di indeks itu — Apple, Microsoft, Amazon, Google, JPMorgan, dan 495 lainnya.
        - paragraph [ref=e126]: "Ini yang membuat ETF istimewa:"
        - list [ref=e127]:
          - listitem [ref=e128]:
            - strong [ref=e129]: Diversifikasi instan
            - text: — Satu pembelian menyebar uangmu ke puluhan atau ratusan investasi
          - listitem [ref=e130]:
            - strong [ref=e131]: Biaya rendah
            - text: — Banyak ETF mengenakan biaya kurang dari 0,10% per tahun (itu sekitar Rp 15 ribu per tahun untuk investasi Rp 15 juta)
          - listitem [ref=e132]:
            - strong [ref=e133]: Diperdagangkan seperti saham
            - text: — Bisa beli dan jual sepanjang hari pada harga pasar
          - listitem [ref=e134]:
            - strong [ref=e135]: Efisien pajak
            - text: — ETF biasanya memunculkan lebih sedikit kejadian kena pajak dibanding reksa dana
          - listitem [ref=e136]:
            - strong [ref=e137]: Transparan
            - text: — Kepemilikan diumumkan setiap hari, jadi kamu selalu tahu isi portofoliomu
        - heading "The 3 Main Types of ETFs" [level=2] [ref=e138]
        - heading "1. Index ETFs (Broad Market)" [level=3] [ref=e139]
        - paragraph [ref=e140]: ETF ini mengikuti indeks pasar seperti S&P 500 atau seluruh pasar saham AS. Ini adalah fondasi dari sebagian besar portofolio investasi.
        - paragraph [ref=e141]:
          - strong [ref=e142]: "Contoh:"
        - list [ref=e143]:
          - listitem [ref=e144]:
            - strong [ref=e145]: VOO
            - text: "(Vanguard S&P 500 ETF) — Expense ratio: 0,03%"
          - listitem [ref=e146]:
            - strong [ref=e147]: VTI
            - text: "(Vanguard Total Stock Market ETF) — Expense ratio: 0,03%"
          - listitem [ref=e148]:
            - strong [ref=e149]: SPY
            - text: "(SPDR S&P 500 ETF) — Expense ratio: 0,09%"
          - listitem [ref=e150]:
            - strong [ref=e151]: IVV
            - text: "(iShares Core S&P 500 ETF) — Expense ratio: 0,03%"
        - paragraph [ref=e152]:
          - strong [ref=e153]: "Cocok untuk:"
          - text: Inti dari portofolio apa pun. Kalau kamu cuma beli satu ETF, pilih ETF indeks pasar luas.
        - heading "2. Bond ETFs" [level=3] [ref=e154]
        - paragraph [ref=e155]: ETF ini berisi obligasi pemerintah dan korporasi, memberi pendapatan dan stabilitas saat pasar saham sedang turun.
        - paragraph [ref=e156]:
          - strong [ref=e157]: "Contoh:"
        - list [ref=e158]:
          - listitem [ref=e159]:
            - strong [ref=e160]: BND
            - text: "(Vanguard Total Bond Market ETF) — Expense ratio: 0,03%"
          - listitem [ref=e161]:
            - strong [ref=e162]: AGG
            - text: "(iShares Core US Aggregate Bond ETF) — Expense ratio: 0,03%"
          - listitem [ref=e163]:
            - strong [ref=e164]: TLT
            - text: "(iShares 20+ Year Treasury Bond ETF) — Expense ratio: 0,15%"
        - paragraph [ref=e165]:
          - strong [ref=e166]: "Cocok untuk:"
          - text: Mengurangi volatilitas portofolio, terutama saat kamu makin dekat ke masa pensiun.
        - heading "3. Sector and Thematic ETFs" [level=3] [ref=e167]
        - paragraph [ref=e168]: ETF ini fokus pada industri atau tema investasi tertentu — teknologi, kesehatan, energi bersih, properti, dan lain-lain.
        - paragraph [ref=e169]:
          - strong [ref=e170]: "Contoh:"
        - list [ref=e171]:
          - listitem [ref=e172]:
            - strong [ref=e173]: QQQ
            - text: "(Invesco Nasdaq-100 ETF) — Banyak saham teknologi, expense ratio: 0,20%"
          - listitem [ref=e174]:
            - strong [ref=e175]: VNQ
            - text: "(Vanguard Real Estate ETF) — REITs, expense ratio: 0,12%"
          - listitem [ref=e176]:
            - strong [ref=e177]: XLF
            - text: "(Financial Select Sector SPDR) — Sektor keuangan, expense ratio: 0,09%"
          - listitem [ref=e178]:
            - strong [ref=e179]: ICLN
            - text: "(iShares Global Clean Energy ETF) — Energi bersih, expense ratio: 0,40%"
        - paragraph [ref=e180]:
          - strong [ref=e181]: "Cocok untuk:"
          - text: Menambah eksposur ke sektor yang kamu yakini akan unggul, setelah kamu punya posisi inti di ETF indeks.
        - heading "The 5 Best ETFs for Beginners in 2026" [level=2] [ref=e182]
        - heading "1. VTI — Vanguard Total Stock Market ETF" [level=3] [ref=e183]
        - paragraph [ref=e184]:
          - strong [ref=e185]: "Expense Ratio:"
          - text: 0,03%
          - strong [ref=e186]: "Holdings:"
          - text: 3.600+ saham AS
          - strong [ref=e187]: "Kenapa jadi #1:"
          - text: VTI memberi kamu seluruh pasar saham AS dalam satu fund — saham besar, menengah, kecil, semuanya. Ini ETF paling cocok untuk strategi “beli lalu lupakan”.
        - heading "2. VOO — Vanguard S&P 500 ETF" [level=3] [ref=e188]
        - paragraph [ref=e189]:
          - strong [ref=e190]: "Expense Ratio:"
          - text: 0,03%
          - strong [ref=e191]: "Holdings:"
          - text: 500 saham AS berkapitalisasi besar
          - strong [ref=e192]: "Kenapa pemula suka:"
          - text: S&P 500 adalah indeks pasar saham yang paling banyak diikuti di dunia. VOO melacaknya hampir sempurna dengan biaya yang sangat rendah.
        - heading "3. VXUS — Vanguard Total International Stock ETF" [level=3] [ref=e193]
        - paragraph [ref=e194]:
          - strong [ref=e195]: "Expense Ratio:"
          - text: 0,07%
          - strong [ref=e196]: "Holdings:"
          - text: 8.500+ saham internasional
          - strong [ref=e197]: "Kenapa penting:"
