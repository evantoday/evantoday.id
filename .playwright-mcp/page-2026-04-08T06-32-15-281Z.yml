            - /url: /blog/7-smart-ways-to-diversify-your-investment-portfolio/
          - text: di luar AS. Saat saham Amerika kurang bagus, saham internasional kadang bisa menutup kekurangannya.
        - heading "4. BND — Vanguard Total Bond Market ETF" [level=3] [ref=e199]
        - paragraph [ref=e200]:
          - strong [ref=e201]: "Expense Ratio:"
          - text: 0,03%
          - strong [ref=e202]: "Holdings:"
          - text: 10.000+ obligasi AS
          - strong [ref=e203]: "Kenapa perlu obligasi:"
          - text: Obligasi membantu meredam portofolio saat pasar saham jatuh. Bahkan alokasi obligasi 10-20% bisa sangat mengurangi volatilitas.
        - heading "5. SCHD — Schwab US Dividend Equity ETF" [level=3] [ref=e204]
        - paragraph [ref=e205]:
