          - text: Kesalahan paling sering saat beli Bitcoin adalah FOMO, salah pilih platform, dan tidak punya rencana keluar.
          - text: Banyak orang fokus di “cara beli”, tapi lupa bahwa keputusan jual itu sama pentingnya.
        - paragraph [ref=e321]: "Berikut kesalahan yang paling sering saya lihat:"
        - heading "1) Beli karena ikut-ikutan" [level=3] [ref=e322]
        - paragraph [ref=e323]: Teman profit, kamu langsung masuk. Ini resep paling cepat untuk beli di harga yang kurang enak.
        - heading "2) Pakai uang kebutuhan" [level=3] [ref=e324]
        - paragraph [ref=e325]: Ini fatal. Kalau uang sewa, uang sekolah, atau uang darurat dipakai beli Bitcoin, kamu sedang berjudi dengan beban hidup sendiri.
        - heading "3) Tidak cek biaya" [level=3] [ref=e326]
