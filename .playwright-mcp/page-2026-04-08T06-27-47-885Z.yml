        - paragraph [ref=e250]:
          - text: "Cara simpan Bitcoin yang aman adalah memilih tempat penyimpanan sesuai tujuan: exchange untuk praktis, wallet pribadi untuk kontrol lebih besar."
          - text: Kalau kamu beli Bitcoin dan lupa soal penyimpanan, itu sama saja seperti beli emas lalu ditaruh sembarangan di laci.
        - paragraph [ref=e251]: "Ada dua opsi utama:"
        - heading "1) Simpan di exchange" [level=3] [ref=e252]
        - paragraph [ref=e253]: Ini paling praktis untuk pemula. Kamu bisa beli dan jual cepat tanpa ribet. Kekurangannya, kamu bergantung pada keamanan platform.
        - heading "2) Simpan di wallet pribadi" [level=3] [ref=e254]
        - paragraph [ref=e255]: Ini lebih aman dari sisi kontrol aset, terutama kalau kamu pegang jangka panjang. Tapi kamu harus paham private key, seed phrase, dan cara backup yang benar.
        - paragraph [ref=e256]: Menurut pengalaman saya, pemula sebaiknya mulai dari exchange dulu sambil belajar. Setelah nominal makin besar, baru pertimbangkan wallet pribadi. Jangan kebalik. Banyak orang baru belajar 2 hari lalu langsung beli hardware wallet, padahal belum paham cara simpan seed phrase. Itu juga berbahaya.
